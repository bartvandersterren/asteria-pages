        - heading "Weekend aanbieding" [level=1] [ref=e54]
        - paragraph [ref=e55]: Opzoek naar een leuke locatie voor jou weekendje weg in Noord Limburg? Maak gebruik van onze speciale weekendaanbieding en verblijf zeer voordelig in een van onze Comfort kamers. Op de dag van aankomst verwennen wij je met een feestelijke welkomstcocktail en een drie-gangen diner in ons restaurant. In de omgeving kun je uitstekend wandelen en fietsen en het centrum van Venray ligt op korte afstand van het hotel. Hier vind je leuke winkelstraten, gezellige bars en trendy restaurants. Ook de kasteeltuinen in Arcen en het Oorlogsmuseum in Overloon zijn een bezoek waard tijdens jou weekendbreak bij Hotel Asteria.
