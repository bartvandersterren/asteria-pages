                      - generic [ref=e336]:
                        - text: "// This sample uses the Place Autocomplete widget to allow the user to search // for and select a place. The sample then displays an info window containing // the place ID and other information about the place that the user has // selected. async function init(): Promise<void> { // Request needed libraries. const [{ InfoWindow }, { AdvancedMarkerElement }] = await Promise.all([ google.maps.importLibrary('maps'), google.maps.importLibrary('marker'), google.maps.importLibrary('places'), ]); const mapElement = document.querySelector('gmp-map')!; const map = mapElement.innerMap; const placeAutocomplete = document.querySelector('gmp-place-autocomplete')!; // Set the map options. map.setOptions({ clickableIcons: false, mapTypeControl: false, streetViewControl: false, }); // Use the bounds_changed event to bias results to the current map bounds. map.addListener('bounds_changed', () => { const bounds = map.getBounds(); if (bounds) { placeAutocomplete.locationBias = bounds; } }); const infoWindow = new InfoWindow(); const infoWindowContent = document.getElementById('infowindow-content')!; infoWindow.setContent(infoWindowContent); const marker = new AdvancedMarkerElement({ map, collisionBehavior: 'REQUIRED_AND_HIDES_OPTIONAL', gmpClickable: true, }); marker.addEventListener('gmp-click', () => { infoWindow.open(map, marker); }); placeAutocomplete.addEventListener( 'gmp-select', async ({ placePrediction }) => { infoWindow.close(); const place = placePrediction.toPlace(); await place.fetchFields({ fields: ['displayName', 'formattedAddress', 'location', 'id'], }); if (!place.location) { return; } if (place.viewport) { map.fitBounds(place.viewport); } else { map.setCenter(place.location); map.setZoom(17); } // Set the position of the marker using the place ID and location. marker.position = place.location; // marker.setVisible(true); // AdvancedMarkerElement is visible by default when map and position are set. infoWindowContent.children.namedItem('place-name')!.textContent = place.displayName!; infoWindowContent.children.namedItem('place-id')!.textContent = place.id; infoWindowContent.children.namedItem('place-address')!.textContent = place.formattedAddress!; infoWindow.open(map, marker); } ); } void init();"
