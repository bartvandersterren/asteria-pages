        - heading "Asperge arrangement" [level=1] [ref=e54]
        - paragraph [ref=e55]:
          - strong [ref=e56]: Beleef het voorjaar op z’n best met dit unieke asperge-arrangement van Hotel Asteria!
          - text: Want waar kun je nu beter van het seizoen én de koningin der groenten genieten, dan in Noord Limburg!
        - paragraph [ref=e57]:
          - text: Met dit smaakvolle arrangement kun je Limburgs Asperges optimaal beleven. Bij aankomst ontvang je
          - strong [ref=e58]: entreetickets voor Openluchtmuseum
          - text: "de Locht: een charmant museumdorp met authentieke gebouwen en tuinen die het leven op het platteland tussen 1850 en 1950 tot leven brengen. Hierbij hoort uiteraard ook de aspergeteelt met de daar bijhorende aspergeveiling."
        - paragraph [ref=e59]:
          - text: Wanneer je op het einde van de dag terug bent in het hotel en nog even genoten hebt van het voorjaarszonnetje op het terras, is het tijd voor een heerlijk diner. Met dit arrangement wordt je verwend met een
          - strong [ref=e60]: 3-gangen Aspergemenu
          - text: ", met zorg samengesteld door ons keukenteam en gemaakt met heerlijke streekproducten. Sluit de dag af met"
          - strong [ref=e61]: een drankje
          - text: in de bar of brasserie, voordat je heerlijk wegzakt in onze comfortabele bedden.
        - paragraph [ref=e62]:
          - text: De volgende ochtend staat er een heerlijk
          - strong [ref=e63]: uitgebreid ontbijtbuffet
          - text: voor je klaar in ons restaurant. Perfect om de dag goed te beginnen voordat je nog even de omgeving gaat verkennen tijdens een verfrissende wandel- of fietstocht. Na je verblijf sturen wij je niet met lege handen naar huis. Je krijgt namelijk nog een kilo
          - strong [ref=e64]: Limburgse Asperges
          - text: en een recept van de chef mee naar huis, zodat je thuis nog even kan nagenieten van je bezoek. Ben je opzoek naar een langer verblijf bij hotel Asteria? Bekijk dan ons
          - link "3-daags hotelarrangement met diner" [ref=e65] [cursor=pointer]:
            - /url: https://www.asteria.nl/3-daags-hotelarrangement-met-diner
          - text: .
