        - generic [ref=e168]:
          - heading "Venlo Centrum Zuid" [level=2] [ref=e169]
          - paragraph [ref=e170]: Venlo is een stad in Noord-Limburg gelegen aan een bocht van de Maas. De stad heeft een lange historie en mede daardoor een karakteristieke binnenstad. De stad kent nog de oude stratenstructuur van de middeleeuwen, met een stadhuis uit de 15de eeuw en kronkelige straatjes die de diverse pleinen verbinden. Met de vele leuke winkels, ateliers en heerlijke restaurants zult u zich hier niet snel vervelen.
          - paragraph [ref=e171]:
            - link "Meer informatie" [ref=e172] [cursor=pointer]:
              - /url: https://www.asteria.nl/nl/venlo-centrum-zuid
