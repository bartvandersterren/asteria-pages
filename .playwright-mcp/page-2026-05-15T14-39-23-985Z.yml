          - paragraph [ref=e193]: Van authentieke koperen brouwketels tot een sfeervolle kelder met flessen Grand Prestige van diverse jaargangen. Tijdens een brouwerijbezoek volg je onder begeleiding van een ervaren gids het complete brouwproces. Je ruikt de hop, proeft de mout en natuurlijk... het bier. Na afloop kun je een bezoek brengen aan de brouwerijwinkel en Café de Hertog Jan Proeverij.
