        - generic [ref=e158]:
          - heading "Oorlogsmuseum" [level=2] [ref=e159]
          - paragraph [ref=e160]: Het Oorlogsmuseum Overloon presenteert de geschiedenis van de Tweede Wereldoorlog. Je ziet hier hoe het zover heeft kunnen komen dat in vijf jaar tijd meer dan vijftig miljoen mensen hun leven verloren, maar ook hoe de onderdrukte bevolking vindingrijk met beperkingen en tekorten omging. Er is aandacht voor het verzet, maar ook voor de vervolging. Ten slotte wordt er natuurlijk ook aandacht besteed aan de bevrijding en de Slag bij Overloon.
