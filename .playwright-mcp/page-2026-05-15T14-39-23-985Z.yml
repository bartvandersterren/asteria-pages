          - paragraph [ref=e134]: Verken de schoonheid van Nationaal Park de Maasduinen
          - paragraph [ref=e135]: Of je nu kiest voor een rustige wandeling of een actieve fietstocht, Nationaal Park De Maasduinen biedt de perfecte omgeving om te ontsnappen aan de drukte en helemaal op te gaan in de natuur. Verken dit prachtige gebied en maak jouw verblijf bij Asteria compleet met een rustgevende dag in dit indrukwekkende natuurgebied.
