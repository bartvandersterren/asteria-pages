        - generic [ref=e149]:
          - heading "Kasteeltuinen Arcen" [level=2] [ref=e150]
          - paragraph [ref=e151]: Kasteeltuinen Arcen is gelegen in het pittoreske dorpje Arcen, in de prachtige Maasduinen van Noord-Limburg. Het is een van de meest veelzijdige bloemen- en plantenparken van Europa. Laat je zintuigen prikkelen, beleef de historie en ontdek de meer dan 15 unieke tuinen die zijn aangelegd rondom een historische buitenplaats met een 17e eeuws kasteel.
          - paragraph [ref=e152]: Tickets zijn verkrijgbaar bij onze receptie
