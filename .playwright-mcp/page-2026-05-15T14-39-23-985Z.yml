      - generic [ref=e141]:
        - heading "Venray Centrum" [level=2] [ref=e142]
        - paragraph [ref=e143]: "Ontdek Venray en beleef de charme van dit sfeervolle dorp: winkel in unieke boetiekjes, bewonder de Grote Kerk, en geniet van een hapje en drankje op een gezellig terras. Het hele jaar door zijn er evenementen en markten, waar je kunt genieten van lokale specialiteiten en de Limburgse gastvrijheid. Venray is dé perfecte bestemming voor een ontspannen en veelzijdig dagje uit tijdens je verblijf bij Asteria."
        - paragraph [ref=e144]:
          - link "Meer informatie" [ref=e145] [cursor=pointer]:
