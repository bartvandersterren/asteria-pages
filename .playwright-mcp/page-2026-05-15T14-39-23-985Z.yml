        - generic [ref=e184]:
          - heading "Thermaalbad Arcen" [level=2] [ref=e185]
          - paragraph [ref=e186]:
            - text: Thermaalbad Arcen is een Nederlands kuuroord gelegen in het buitengebied van het dorp Arcen. Het kuuroord beschikt over binnen- en buitenbaden met warm water uit plaatselijke dieptebronnen, massage- en therapeutische baden, sauna - faciliteiten en therapeutische faciliteiten. In 1987 is is men begonnen met het omhoogpompen van het thermaalwater. Het thermaalbad is in 1989 geopend, en daarmee een van de eerste kuuroorden van Nederland.
            - link "Meer informatie" [ref=e187] [cursor=pointer]:
