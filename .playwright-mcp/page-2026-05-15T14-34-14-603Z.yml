          - paragraph [ref=e165]:
            - text: Kom naar Asteria voor bijzondere evenementen en gezellige momenten. Geniet samen van sfeervolle
            - strong [ref=e166]
            - text: feestdagen, zoals een sfeervol
            - link "Kerstdiner" [ref=e167] [cursor=pointer]:
