        - generic [ref=e176]:
          - heading "Restaurant" [level=2] [ref=e177]
          - paragraph [ref=e178]: Bij Asteria draait alles om zorgeloos genieten. In onze sfeervolle brasserie kun je ontspannen met een kop koffie of een borrel, terwijl onze bar de perfecte plek is voor een gezellige avond met vrienden.
          - paragraph [ref=e179]: Laat je verrassen door ons proeverijmenu, waarmee je een selectie van verfijnde gerechten kunt ontdekken. Of kies een favoriet van onze uitgebreide menukaart, met heerlijke opties voor zowel lunch als diner. Daarnaast bieden we regelmatig specials, geïnspireerd door seizoensgebonden ingrediënten en lokale smaken.
          - paragraph [ref=e180]: Kom langs en proef de gastvrijheid van Asteria. Reserveer vandaag nog jouw tafel!
