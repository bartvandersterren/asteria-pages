      - heading "Voel je welkom in Noord Limburg, bij Hotel Asteria Venray." [level=1] [ref=e59]
      - heading "Dineren, Vergaderen, Overnachten en Feesten in Venray" [level=2] [ref=e60]
      - paragraph [ref=e61]:
        - text: In het prachtige
        - link "Noord Limburg" [ref=e62] [cursor=pointer]:
          - /url: hotel-noord-limburg
        - text: vindt u Hotel Asteria aan de rand van Venray. Gelegen in het gebied van de Limburgse Peel en Nationaal Park de Maasduinen is het de ideale uitvalsbasis voor al uw wandel- en fietsvakanties.
      - paragraph [ref=e63]:
        - text: Tijdens uw verblijf bij Asteria bent u verzekerd van een heerlijk nachtje weg. In ons
        - link "restaurant Asteria" [ref=e64] [cursor=pointer]:
          - /url: restaurant
        - text: en onze gezellige brasserie zullen de verrassende gerechten u zeker smaken. Na een actieve dag is het ruime terras een fijne plek om in de zon te zitten met een hapje of een drankje. Sluit de dag af met een drankje in onze hotelbar, voordat u neerstrijkt op de fijne bedden in uw
        - link "moderne hotelkamer" [ref=e65] [cursor=pointer]:
          - /url: kamers
        - text: .
        - text: Al onze hotelkamers zijn voorzien van gratis wifi, airconditioning, een zithoek en een badkamer met bad of douche. Mocht u meer luxe willen tijdens uw verblijf, dan zijn onze
        - link "Deluxe kamers en suites" [ref=e66] [cursor=pointer]:
          - /url: kamers
        - text: met infrarood sauna geschikt voor u.
