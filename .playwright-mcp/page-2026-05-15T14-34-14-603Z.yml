            - text: of een gezellig Paasontbijt. Ervaar met familie en vrienden onze heerlijke gerechten in een warme feestelijke ambiance.
          - paragraph [ref=e169]: Daarnaast biedt Zaal Zeven het hele jaar door unieke evenementen. Van spetterende tribute nights en dance party's tot heerlijke diners met entertainment, elke avond belooft sfeer, gezelligheid en topentertainment.
