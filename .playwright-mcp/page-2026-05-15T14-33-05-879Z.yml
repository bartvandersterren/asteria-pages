      - paragraph [ref=e54]: 2 Gasten maximaal | Ca. 22 m² | Twee eenpersoonsbedden
      - paragraph [ref=e55]:
        - strong [ref=e56]: Voor een comfortabel verblijf
        - text: Onze Comfort kamers bieden alles wat jij nodig hebt voor een aangenaam verblijf in Noord-Limburg. Geniet van een heerlijke nachtrust op de comfortabele bedden en maak gebruik van voorzieningen zoals een koffiezetapparaat, waterkoker, airconditioning, een lcd-tv, een zithoek, een douche en gratis WiFi.
        - text: Liever een tweepersoonsbed? Neem contact met ons op voor de mogelijkheden tot een upgrade!
      - paragraph [ref=e57]:
        - strong [ref=e58]: Halfpension
        - text: Geniet van een complete ervaring met een overnachting en een verrukkelijk 3-gangen diner. Selecteer de optie halfpension bij je reservering.
