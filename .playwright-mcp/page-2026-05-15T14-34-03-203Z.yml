      - generic [ref=e53]:
        - heading "Luxe Lente Arrangement" [level=1] [ref=e54]
        - paragraph [ref=e55]:
          - strong [ref=e56]: Voorjaarsarrangement bij Asteria
        - paragraph [ref=e57]: Ervaar de pracht van de lente tijdens een ontspannen uitje vol bloeiende natuur, culinaire verwennerij en de warme voorjaarszon op het terras. Klinkt dat niet als de perfecte ontsnapping? Dan ben je bij ons aan het juiste adres!
        - paragraph [ref=e58]:
          - text: Met dit compleet verzorgde arrangement, inclusief overnachting, uitgebreid ontbijt, een heerlijk 3-gangen diner en
          - strong [ref=e59]: entree tot Kasteeltuinen Arcen
          - text: ", ontdek je het mooiste van Noord-Limburg in het voorjaar. Wandel op je gemak door meer dan 15 unieke tuinen, laat je verrassen door kleur, geur en historie en beleef de bijzondere sfeer rondom de historische buitenplaats met een 17e-eeuws kasteel."
        - paragraph [ref=e60]: Combineer je bezoek aan de Kasteeltuinen met een mooie wandeling of fietstocht door de omgeving en sluit de dag ontspannen af op ons terras, waar de lentezon je gezicht verwarmt. Dit Luxe Lente-arrangement biedt alles voor een zorgeloos en compleet voorjaarsverblijf.
        - paragraph [ref=e61]: Laat je in de watten leggen en geniet optimaal van het voorjaar – natuur, historie en ontspanning komen hier perfect samen!
        - paragraph [ref=e62]
