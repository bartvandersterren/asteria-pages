        - heading "Limburg Arrangement" [level=1] [ref=e54]
        - paragraph [ref=e55]:
          - text: Welkom in het prachtige Limburg! Laat je onderdompelen in de gastvrijheid en charme van deze bijzondere provincie met ons
          - strong [ref=e56]: 4-daagse Limburg hotel arrangement
          - text: . Bij aankomst word je verwelkomd met een
          - strong [ref=e57]: kop koffie of thee
          - text: ", vergezeld van een stuk"
          - strong [ref=e58]: verrukkelijke Limburgse vlaai
          - text: .
        - paragraph [ref=e59]:
          - text: Je verblijft gedurende deze vier dagen in een comfortabele kamer, waar je volledig tot rust kunt komen na een dag vol avontuur. Elke ochtend staat er een
          - strong [ref=e60]: uitgebreid ontbijtbuffet
          - text: voor je klaar, zodat je vol energie aan je dag kunt beginnen.
        - paragraph [ref=e61]:
          - text: In de avonden word je culinair verwend met een
          - strong [ref=e62]: heerlijk 3-gangenmenu
          - text: ", samengesteld met verse streekproducten. Laat je verrassen door de smaakvolle creaties van ons keukenteam."
        - paragraph [ref=e63]:
          - text: Om de prachtige omgeving van Limburg te verkennen, stellen wij gedurende je verblijf
          - strong [ref=e64]: gratis elektrische fietsen
          - text: ter beschikking. Verken de Limburgse natuur, zoals nationaal Park de Maasduinen, de charmante dorpjes en steden of breng een bezoekje aan een van de vele interessante bezienswaardigheden in de buurt. Bij de receptie kun je tevens terecht voor diverse
          - strong [ref=e65]: fiets- en wandelroutes
          - text: ", zorgvuldig uitgekozen om jou de mooiste plekjes te laten ontdekken. Benieuwd wat er allemaal te beleven valt in onze regio?"
          - link "Bekijk dan hier onze gouden tips" [ref=e66] [cursor=pointer]:
