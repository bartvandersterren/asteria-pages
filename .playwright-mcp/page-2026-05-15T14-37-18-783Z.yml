        - paragraph [ref=e55]:
          - text: In samenwerking met
          - link "Oorlogsmuseum Overloon" [ref=e56] [cursor=pointer]:
            - /url: https://www.oorlogsmuseum.nl/nl/
          - text: hebben wij een indrukwekkend arrangement samengesteld
          - strong [ref=e57]: in het teken van de Tweede Wereldoorlog
          - text: . Het verhaal en de belevenis van de tweede wereldoorlog staat centraal en dat merk je al wanneer je aankomt in ons hotel. Je wordt ontvangen met een informatieve welkomstbrief, filmpjes over het Oorlogsmuseum en een
          - strong [ref=e58]: passende verrassing
          - text: op je kamer. Hierdoor kan jij vast in de juiste sfeer komen voordat je het museum gaat bezoeken.
        - paragraph [ref=e59]:
          - text: Tijdens je bezoek aan het oorlogsmuseum ga je de geschiedenis van de tweede wereldoorlog ervaren, compleet met een
          - strong [ref=e60]: kop koffie of thee
          - text: in het museumcafé. Na een indrukwekkende middag in het museum geniet je bij ons van een heerlijk
          - strong [ref=e61]: 3-gangen diner
          - text: ", voordat je neerstrijkt op onze comfortabele bedden. De volgende ochtend geniet je van een"
          - strong [ref=e62]: uitgebreid ontbijtbuffet
          - text: ", zodat je met volle maag nog even de omgeving kan gaan verkennen voordat je terug naar huis keert. Wil je liever op de dag van vertrek het museum bezoeken? Ook dat is uiteraard geen probleem!"
        - paragraph [ref=e63]:
