        - generic [ref=e100]:
          - paragraph [ref=e101]: "Héérlijke 4-nachten bij Venray : ZALIG..!!! Ligging van het hotel is perfect: pal naast afrit snelweg en toch dicht bij de stad. Van snelweg-geluiden hadden we geen last. Naast een degelijke isolatie is de kamer verder héél goed : groot, goed bed, douche & wc werken perfect. Prettig om op je kamer zelf van een koffie te genieten ! Kamer is ruim, groot TV scherm : prima..!!! We zijn fietsers, 100 km fietsen is voor ons de norm... Ontbijt is voor ons zoooo belangrijk, we waren niet ontgoocheld : super goed ontbijt..!!!! Ons fietsen stonden in de nacht veilig weg, niet onbelangrijk... Personeel : goed op de hoogte van alles & nog wat...behulpzaam en altijd vriendelijk"
          - paragraph [ref=e102]:
            - emphasis [ref=e103]: Eddy, België, 12 juni 2025
