      - generic [ref=e84]:
        - img "Maasduinen - omgeving Venray - Overnachten Noord Limburg" [ref=e86]
        - generic [ref=e88]:
          - heading "Ontdek de schitterende omgeving" [level=2] [ref=e89]
          - paragraph [ref=e90]:
            - text: Gelegen in het hart van Noord-Limburg, direct aan de A73, biedt Hotel Asteria Venray de perfecte uitvalsbasis om deze
            - link "prachtige regio" [ref=e91] [cursor=pointer]:
              - /url: https://www.asteria.nl/omgeving
            - text: te ontdekken. Van uitgestrekte natuurreservaten tot historische bezienswaardigheden en gezellige stadjes, er is voor elk wat wils. Verken de betoverende landschappen, geniet van schilderachtige fiets- en wandelroutes en ontdek de rijke culturele erfgoed van de omgeving. Perfect dus voor wanneer je wilt overnachten in Noord Limburg.
          - paragraph [ref=e92]:
            - link "Boek een overnachting" [ref=e93] [cursor=pointer]:
              - /url: https://api.mews.com/distributor/6dc9094c-76e3-4fd8-83a7-af1d00ffc556?
      - generic [ref=e94]:
