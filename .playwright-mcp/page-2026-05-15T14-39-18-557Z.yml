    - generic [ref=e51]:
      - heading "Over ons" [level=1] [ref=e52]
      - paragraph [ref=e53]:
        - strong [ref=e54]: Welkom bij Hotel Asteria, waar Limburgse gastvrijheid tot leven komt
      - paragraph [ref=e55]: "Welkom bij Hotel Asteria, een plek die voor ons voelt als thuis, en die we graag delen met jou. Wij zijn meer dan een hotel. We zijn een familiair team dat elke dag klaarstaat om jouw verblijf bijzonder te maken. Of je nu komt voor rust, romantiek, een vergadering of een feest: wij zorgen ervoor dat je je welkom voelt vanaf het allereerste moment. In het noorden van Noord-Limburg, omringd door natuur, cultuur en charme, creëren we een warm thuis voor reizigers, levensgenieters en zakelijke gasten."
      - paragraph [ref=e56]:
        - strong [ref=e58]: Comfort met een persoonlijke touch
        - text: "Of je nu toe bent aan een weekendje weg, een zakelijke meeting plant of opzoek bent naar een locatie om jou bijzondere moment te vieren, bij ons vind je alles onder één dak. Onze kamers zijn ruim, stijlvol en van alle moderne gemakken voorzien. Van comfortabele standaardkamers tot luxe suites: we zorgen dat je heerlijk slaapt en ontspannen wakker wordt. En in ons restaurant? Daar proef je de smaken van Limburg. Ons keukenteam kookt met passie en aandacht, van een uitgebreid ontbijt tot een verfijnd diner. En natuurlijk schenken we er met plezier een goed glas wijn of een lokaal biertje bij. Samen genieten, daar draait het om."
      - paragraph [ref=e59]:
        - strong [ref=e61]: Wat ons écht bijzonder maakt
        - text: "Dat zijn wij, het team achter Hotel Asteria. Elke dag staan we met een glimlach voor je klaar. We luisteren, helpen en zorgen dat jij je gezien en gewaardeerd voelt. Persoonlijke aandacht zit in ons DNA. We geloven dat echte gastvrijheid begint bij oprechte betrokkenheid. Dat is de Limburgse warmte waar we zo trots op zijn: hartelijk, eerlijk en persoonlijk."
      - paragraph [ref=e62]: Dus kom binnen voel je thuis. Wij kijken ernaar uit je te ontmoeten.
      - paragraph [ref=e63]: Team Asteria
    - generic [ref=e64]:
      - generic [ref=e68]:
        - heading "Hotelarrangementen" [level=2] [ref=e69]
        - paragraph [ref=e70]: Wil je alles uit jouw verblijf halen en optimaal genieten van onze veelzijdige omgeving? Bekijk dan ook eens de arrangementen die wij voor jou beschikbaar hebben. Of je nu opzoek bent naar een ontspannen nachtje weg, een actief verblijf, een overnachting met diner of wil je liever de omgeving ontdekken en een mooie fietstocht maken? Onze arrangementen bieden voor ieder wat wils die opzoek is naar een compleet verblijf!
        - paragraph [ref=e71]:
          - link "Bekijk de hotelarrangementen" [ref=e72] [cursor=pointer]:
            - /url: https://www.asteria.nl/arrangementen
      - generic [ref=e73]:
        - img "Kamers en suites - overnachten Noord Limburg" [ref=e75]
        - generic [ref=e77]:
          - heading "Kamers en suites" [level=2] [ref=e78]
          - paragraph [ref=e79]:
            - text: Laat je verwennen door onze smaakvol ingerichte
            - link "kamers en suites" [ref=e80] [cursor=pointer]:
              - /url: https://www.asteria.nl/kamers
            - text: ", met moderne voorzieningen en een gezellige sfeer. Elke kamer is ontworpen om aan al je wensen te voldoen, wanneer jij komt overnachten in Noord Limburg. Met een breed scala aan kamertypes hebben we voor ieder wat wils. Kies voor een comfortabele kamer voor één of twee dagen, of geniet van extra luxe in onze Deluxe kamers met infrarood sauna."
          - paragraph [ref=e81]:
            - link "Reserveer een kamer" [ref=e82] [cursor=pointer]:
