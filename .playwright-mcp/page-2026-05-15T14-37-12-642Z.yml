        - heading "Golfarrangement bij Hotel Asteria" [level=1] [ref=e54]
        - paragraph [ref=e55]:
          - strong [ref=e56]: Beleef het ultieme golfuitje met ons Golfarrangement!
          - text: Ontdek ons
          - strong [ref=e57]: Golfarrangement
          - text: voor een ultieme golfervaring! Kies jouw favoriete golfbaan en geniet van een ontspannen dag op de green, gevolgd door een comfortabel verblijf in een van onze modern ingerichte Royale kamers. Deze zijn van alle gemakken voorzien, zoals een koffiezetapparaat, waterkoker, airconditioning, zithoek en gratis wifi. Na een goede nachtrust staat er een uitgebreid ontbijtbuffet voor je klaar, en ’s avonds geniet je van een heerlijk 3-gangen diner in ons restaurant. Alles is aanwezig voor een compleet en zorgeloos golfverblijf!
        - paragraph [ref=e58]:
          - strong [ref=e59]: "Keuze uit twee prachtige golfbanen:"
        - paragraph [ref=e60]:
          - link "Golfbaan Landgoed Bleijenbeek" [ref=e61] [cursor=pointer]:
            - /url: https://bleijenbeek.nl/
            - strong [ref=e62]: Golfbaan Landgoed Bleijenbeek
          - text: "(Afferden):"
          - text: Gelegen in het natuurrijke Limburgse Maasduinengebied. Deze glooiende baan met waterpartijen, oude bomenlanen en een kasteelruïne vraagt om tactisch spel dankzij de slimme indeling en hoogteverschillen.
        - paragraph [ref=e63]:
          - link "Golfclub Geijsteren" [ref=e64] [cursor=pointer]:
            - /url: https://www.golfclubgeijsteren.nl/
            - strong [ref=e65]: Golfclub Geijsteren
          - text: "(Geijsteren):"
          - text: Een sfeervolle, bosrijke baan op een historisch landgoed. De eerste 13 holes liggen verscholen tussen de bomen, gevolgd door 5 uitdagende waterholes. Een baan met karakter en uitdaging!
        - link "Reserveer dit arrangement" [ref=e66] [cursor=pointer]:
