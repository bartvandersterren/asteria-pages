      - heading "Wellnessarrangement" [level=1] [ref=e54]
      - paragraph [ref=e55]:
        - text: Welkom bij Hotel Asteria, waar uw moment van ontspanning begint. Met ons
        - strong [ref=e56]: wellnessarrangement
        - text: "geniet u van een complete beleving op de Top Floor: een ruim 300 m² grote wellness waar warmte, rust en zuivering centraal staan. Geen standaard hotelspa, maar een complete ervaring."
      - paragraph [ref=e57]:
        - text: Bij aankomst ontvangt u een
        - strong [ref=e58]: welkomstdrankje
        - text: "met een flesje Botega op uw comfortabele kamer, samen met een badjas, slippers en een handdoekpakket. Zo bent u helemaal klaar om de wellness te ontdekken: vijf unieke cabines, verfrissende belevenisdouches, een dompelbad en een kruidenbad. Zin om te relaxen? In de sfeervolle relaxruimte komt u helemaal tot rust met comfortabele zit- en ligplaatsen, drankjes en snacks."
      - paragraph [ref=e59]:
        - text: Na een middag onthaasten verwennen wij u in onze brasserie met een
        - strong [ref=e60]: heerlijk drie-gangen diner
        - text: ", samengesteld met verse streekproducten en seizoensgebonden smaken. De volgende ochtend start u uw dag uitgerust en ontspannen met ons"
        - strong [ref=e61]: uitgebreid ontbijtbuffet
        - text: ", vol met verse keuzes voor ieders smaak."
      - paragraph [ref=e62]: Neem de tijd. Geniet. Voel u thuis bij Asteria.
